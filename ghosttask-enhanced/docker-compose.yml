version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghosttask_app
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db:27017/ghosttask
      - NODE_ENV=production
    depends_on:
      - db
    restart: always

  db:
    image: mongo:6.0
    container_name: ghosttask_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
